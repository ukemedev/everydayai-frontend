packages:
  "framer-motion": "Smooth page transitions, modal animations, and micro-interactions"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to safely merge Tailwind classes without style conflicts"
  "zod": "Robust schema validation for forms and API responses"
  "date-fns": "Human-readable date formatting for UI elements"

images:
  - path: "artifacts/web-app/public/images/auth-bg.png"
    description: "Abstract fluid gradient background in deep indigo, violet, and pristine white, featuring soft glowing light leaks and a sleek modern aesthetic. Very minimal and elegant."
    aspect_ratio: "16:9"
  - path: "artifacts/web-app/public/images/avatar.png"
    description: "Minimalist 3D rendered avatar illustration of a creative professional, soft studio lighting, smooth clay-like texture, clean background"
    aspect_ratio: "1:1"

notes:
  - App relies on /api/healthz for system status
  - Missing CRUD endpoints (/api/projects) will gracefully fail and display beautiful error states
  - Fully wired React Query caching for all entity operations
